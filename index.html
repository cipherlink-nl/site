<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CipherLink - Reverse Engineering & Software Programming.">
    <title>CipherLink - Reverse Engineering & Software Programming</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #000000; 
            color: #c9d1d9;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; 
            gap: 20px;
            width: 100%;
            box-sizing: border-box;
            padding: 20px;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                to bottom right, 
                rgba(0, 120, 255, 0.25) 0%,   
                rgba(0, 0, 0, 1) 60%        
            );
            z-index: -1; 
        }

        .container {
            background-color: #0d1117; 
            padding: 35px; 
            border-radius: 8px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
            text-align: center;
            max-width: 380px; 
            width: 90%;
            position: relative;
            z-index: 1; 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 255, 255, 0.15);
        }

        .logo {
            max-width: 90%; 
            height: auto;
            margin-bottom: 20px;
        }

        .description {
            color: #8b949e;
            font-size: 0.9em;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        h1 {
            color: #ffffff;
            font-size: 1.2em;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            border-bottom: 1px dashed #30363d;
            padding-bottom: 10px;
        }

        .info-group {
            text-align: left;
            margin-bottom: 20px;
        }
        
        .info-group:last-of-type {
            margin-bottom: 0;
        }

        .label {
            font-weight: 700;
            color: #8b949e; 
            display: block;
            font-size: 0.85em;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .value {
            font-size: 1.05em;
            color: #ffffff;
            word-break: break-word;
        }

        a {
            color: #ffffff;
            text-decoration: none;
            transition: color 0.2s ease-in-out;
            border-bottom: 1px solid transparent;
        }

        a:hover {
            color: #00ffff;
            border-bottom: 1px solid #00ffff;
        }
        
        footer {
            color: #8b949e;
            font-size: 0.8em;
            letter-spacing: 0.5px;
            z-index: 1;
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px 20px;
            }

            .value {
                font-size: 1em;
            }

            h1 {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<main class="container">
    <img src="cipherlink_logo.png" alt="CipherLink Logo" class="logo">
    
    <div class="description">
        Reverse Engineering & Software Programming.
    </div>
    
    <h1>Contact</h1>

    <div class="info-group">
        <span class="label">KvK-nummer</span>
        <span class="value">87697467</span>
    </div>

    <div class="info-group">
        <span class="label">Btw-ID</span>
        <span class="value">NL004465309B71</span>
    </div>

    <div class="info-group">
        <span class="label">E-mailadres</span>
        <span class="value"><a href="mailto:mdenotter@cipherlink.nl">mdenotter@cipherlink.nl</a></span>
    </div>
</main>

<footer>
    &copy; 2026 CipherLink. Alle rechten voorbehouden.
</footer>

</body>
</html>
